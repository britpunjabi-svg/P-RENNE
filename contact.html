    <main>
        <section>
            <h1>Contact Us</h1>
            <div class="contact-info">
                <p><strong>Address:</strong> 427 Center St, Healdsburg, CA</p>
                <p><strong>Email:</strong> <a href="mailto:thepourer.rps@pperenne.com">thepourer.rps@pperenne.com</a></p>
                <p><strong>Phone:</strong> <a href="tel:707-849-0404">707-849-0404</a></p>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>
