<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pérenne</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">Pérenne</div>
    </header>

    <section id="hero" style="background-image: url('https://placehold.co/1920x1080/800020/ffffff'); background-size: cover; background-position: center;">
        <div class="hero-text">
            <h1>Something exquisite is stirring...</h1>
        </div>
    </section>

    <section id="origin">
        <h2>From the sun-drenched hills of SONOMA COUNTY</h2>
        <img src="https://placehold.co/800x600/f9f9f9/800020?text=Sonoma+Vineyard" alt="Sonoma Vineyard">
    </section>

    <section id="philosophy">
        <div class="philosophy-content">
            <h2>A taste of romance... A celebration of life...</h2>
        </div>
    </section>

    <section id="montage">
        <div class="montage-gallery">
            <img src="https://placehold.co/400x300/eeeeee/333333?text=Gentle+Touch" alt="Hand on grapevine">
            <img src="https://placehold.co/400x300/dddddd/333333?text=Embossed+Logo" alt="Embossed logo on bottle">
            <img src="https://placehold.co/400x300/cccccc/333333?text=Champagne+Toast" alt="Toasting with champagne">
        </div>
    </section>

    <section id="collection">
        <h2>Our Collection</h2>
        <div class="wine-trio">
            <div class="wine">
                <img src="https://placehold.co/300x500/800020/ffffff?text=Pinot+Noir" alt="Pérenne Pinot Noir">
                <h3>Pérenne Pinot Noir</h3>
            </div>
            <div class="wine">
                <img src="https://placehold.co/300x500/1a1a1a/ffffff?text=Brut" alt="Pérenne Brut">
                <h3>Pérenne Brut</h3>
            </div>
            <div class="wine">
                <img src="https://placehold.co/300x500/ffc0cb/333333?text=Rosé" alt="Pérenne Rosé">
                <h3>Pérenne Rosé</h3>
            </div>
        </div>
    </section>

    <section id="coming-soon">
        <h2>PÉRENNE</h2>
        <p>Coming Soon</p>
    </section>

    <footer>
        <p>pperenne.com</p>
    </footer>

</body>
</html>
